
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KTM Workshop System</title>
<style>
body {font-family: Arial; margin:0; background:#f4f4f4;}
.sidebar {width:220px; background:#111827; color:white; height:100vh; position:fixed; padding:20px;}
.main {margin-left:240px; padding:20px;}
.card {background:white; padding:20px; border-radius:10px; margin-bottom:20px;}
table {width:100%; border-collapse:collapse;}
th, td {padding:10px; border-bottom:1px solid #ddd;}
</style>
</head>
<body>
<div class="sidebar">
<h2>KTM Workshop</h2>
<p>Dashboard</p>
<p>Customer</p>
<p>Quotation</p>
<p>Inventory</p>
<p>Invoice</p>
</div>

<div class="main">
<div class="card">
<h1>Dashboard</h1>
<p>Uang Masuk: Rp145.000.000</p>
<p>Profit: Rp53.000.000</p>
</div>

<div class="card">
<h2>Invoice</h2>
<table>
<tr><th>No</th><th>Customer</th><th>Total</th></tr>
<tr><td>INV-001</td><td>PT Abadi Jaya</td><td>Rp60.000.000</td></tr>
<tr><td>INV-002</td><td>PT Mekar Indo</td><td>Rp35.000.000</td></tr>
</table>
</div>
</div>
</body>
</html>
